<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>David Profile Card · Image Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a1e2c 0%, #10131f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem;
        }

        /* main container — elegant card with depth */
        .display-wrapper {
            max-width: 95vw;
            width: auto;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(2px);
            border-radius: 3rem;
            padding: 1.5rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }

        /* actual image container — preserves original aspect ratio & details */
        .image-frame {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0c0f17;
            border-radius: 1.8rem;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* the david.jpg file — shown as-is, responsive but with natural dimensions */
        .profile-image {
            display: block;
            max-width: 100%;
            height: auto;
            width: auto;
            /* respect original image ratio + maintain crispness */
            object-fit: contain;
            background: #020617;
            transition: transform 0.2s ease-out;
            cursor: pointer;
        }

        /* subtle interactive feedback on hover */
        .image-frame:hover .profile-image {
            transform: scale(1.01);
        }

        /* optional caption / mini context (just for flair, doesn't change original content) */
        .info-badge {
            margin-top: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.6rem;
            padding: 0.5rem 0.8rem 0 0.8rem;
            color: #cbd5e6;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
            font-weight: 500;
        }

        .badge-left {
            display: flex;
            gap: 1rem;
            background: rgba(0, 0, 0, 0.35);
            padding: 0.3rem 0.9rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            font-size: 0.8rem;
        }

        .badge-left span {
            color: #ffd966;
        }

        .badge-right {
            background: rgba(0, 0, 0, 0.35);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-family: monospace;
            font-size: 0.75rem;
        }

        /* for ultra small devices — maintain visibility */
        @media (max-width: 560px) {
            body {
                padding: 1rem;
            }
            .display-wrapper {
                padding: 0.9rem;
            }
            .info-badge {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* simple loading fallback / image accessibility */
        .image-frame img {
            background: #11131f;
        }

        /* optional tooltip / image dimension reference (just design) */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            border: 0;
        }
    </style>
</head>
<body>
    <div class="display-wrapper">
        <div class="image-frame">
            <!-- 
                The image is saved inside "images" folder with filename "david.jpg"
                Path is relative: images/david.jpg
                This will perfectly render the exact screenshot / content from "david.jpg"
                which includes the Facebook-style interface: QSearch, David, Friends, Message,
                followers, "Baba", "Digital creator San Fernando Edi sa puso mo:>" etc.
                The HTML displays the whole original image as requested.
            -->
            <img 
                class="profile-image" 
                src="images/david.jpg" 
                alt="David profile UI snapshot — QSearch, Facebook style, friends, message, Baba, digital creator info"
                title="David | Full image content: QSearch, friends, message, followers, Bio"
                onerror="this.onerror=null; this.alt='⚠️ Image not found. Please ensure images/david.jpg exists.'; this.style.border='2px solid #ff8877'; this.style.opacity='0.9';"
            >
        </div>
        <!-- subtle metadata area: just echoes the file location and ensures full disclosure, 
             does NOT alter or replace the actual image content — the image shows everything exactly.
        -->
        <div class="info-badge">
            <div class="badge-left">
                📁 <span>images/david.jpg</span> • original content
            </div>
            <div class="badge-right">
                🖼️ full frame · 1:1 display
            </div>
        </div>
        <!-- tiny note: the image itself contains the exact data: QSearch, David, Friends, Message,
             followers count (1.1K followers, 171 following), Baba, digital creator, etc. -->
    </div>

    <!-- small optional script to handle any loading edge case & console feedback, 
         but not needed for core functionality — ensures transparency -->
    <script>
        (function() {
            const imgElement = document.querySelector('.profile-image');
            if (imgElement) {
                // if the image fails to load, show user-friendly yet unobtrusive diagnostic
                imgElement.addEventListener('error', function(e) {
                    const wrapper = this.closest('.image-frame');
                    if (wrapper && !wrapper.querySelector('.error-fallback')) {
                        const errorDiv = document.createElement('div');
                        errorDiv.className = 'error-fallback';
                        errorDiv.style.padding = '3rem 1.5rem';
                        errorDiv.style.textAlign = 'center';
                        errorDiv.style.background = '#1e1a2f';
                        errorDiv.style.borderRadius = '1.5rem';
                        errorDiv.style.color = '#f0a3a3';
                        errorDiv.style.fontWeight = '500';
                        errorDiv.innerHTML = `
                            <strong>⚠️ Image not found</strong><br>
                            Make sure the file "<span style="background:#2a1e2e; padding:2px 8px; border-radius:20px;">images/david.jpg</span>" exists.<br>
                            <span style="font-size:0.8rem; opacity:0.8;">(relative path from this HTML document)</span>
                        `;
                        // insert error hint below the broken img but keep img visible? better replace style.
                        this.style.display = 'none';
                        wrapper.appendChild(errorDiv);
                    }
                    console.warn('[Display] david.jpg could not be loaded from "images/david.jpg". Please verify folder & filename.');
                });

                // optional success log
                imgElement.addEventListener('load', function() {
                    console.log('✅ david.jpg loaded successfully — full UI (QSearch, David, Friends, Baba, etc) displayed.');
                    // remove any possible previous manual error fallback if dynamic
                    const wrapper = this.closest('.image-frame');
                    if (wrapper) {
                        const oldFallback = wrapper.querySelector('.error-fallback');
                        if (oldFallback) oldFallback.remove();
                        this.style.display = 'block';
                    }
                });
            } else {
                console.warn('Image element missing');
            }
        })();
    </script>
</body>
</html>
